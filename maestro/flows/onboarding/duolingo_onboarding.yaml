# Full new-user onboarding journey (English UI, com.duolingo).
# Split into subflows under maestro/subflows/ for readability and reuse.
appId: com.duolingo
onFlowComplete:
  - runFlow: ../../subflows/teardown_stop_app.yaml
---
- launchApp:
    clearState: false
- runFlow: ../../subflows/duo_01_welcome.yaml
- runFlow: ../../subflows/duo_02_questions_intro.yaml
- runFlow: ../../subflows/duo_03_hear_about.yaml
- runFlow: ../../subflows/duo_04_proficiency.yaml
- runFlow: ../../subflows/duo_05_motivation.yaml
- runFlow: ../../subflows/duo_06_daily_goal.yaml
- runFlow: ../../subflows/duo_07_widget_and_outcomes.yaml
- runFlow: ../../subflows/duo_08_placement.yaml
